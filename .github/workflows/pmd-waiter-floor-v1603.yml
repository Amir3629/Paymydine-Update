name: PMD Waiter Floor V160.3

on:
  push:
    branches:
      - agent/waiter-floor-edit-layout-smooth-final
    paths:
      - .github/pmd_waiter_floor_v1603_patch.py
      - .github/workflows/pmd-waiter-floor-v1603.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-edit-layout-smooth-final
          fetch-depth: 0

      - name: Apply exact V160.3 patch
        run: python3 .github/pmd_waiter_floor_v1603_patch.py

      - name: Validate JavaScript
        run: |
          node --check app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -F "pmd-waiter-floor-edit-v160.3" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -F "The floor tile itself is a button" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -F "toolbarEdit" app/admin/assets/js/pmd-waiter-floor-edit-v160.js

      - name: Commit clean source result
        run: |
          rm -f .github/pmd_waiter_floor_v1603_patch.py
          rm -f .github/workflows/pmd-waiter-floor-v1603.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/assets/js/pmd-waiter-floor-edit-v160.js .github
          git commit -m "Fix waiter floor button drag authority V160.3"
          git push origin HEAD:agent/waiter-floor-edit-layout-smooth-final
