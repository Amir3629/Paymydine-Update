name: Apply waiter floor compact fix

on:
  push:
    branches:
      - agent/waiter-floor-compact-expand-final

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-compact-expand-final
          fetch-depth: 0

      - name: Apply source fix
        run: python .github/pmd_waiter_floor_compact_final.py

      - name: Validate source fix
        shell: bash
        run: |
          set -euo pipefail
          php -l app/admin/views/_layouts/default.blade.php
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          source = Path('app/admin/views/_layouts/default.blade.php').read_text(encoding='utf-8')
          for script_id in [
              'pmd-waiter-dashboard-v19-clean-cards-working-unmerge-script',
              'pmd-v175c-no-dupe-no-blink-script',
              'pmd-v190-container-only-floor-compact-script',
          ]:
              match = re.search(
                  r'<script id="' + re.escape(script_id) + r'">\s*(.*?)\s*</script>',
                  source,
                  re.S,
              )
              assert match, script_id
              target = Path('/tmp') / (script_id + '.js')
              target.write_text(match.group(1), encoding='utf-8')
              subprocess.run(['node', '--check', str(target)], check=True)

          assert 'PMD_V191_COMPACT_STRIP_AUTHORITY' not in source
          assert 'pmd-v191-mini-table' not in source
          assert "localStorage.setItem('pmd_waiter_floor_compact'" not in source
          PY
          git diff --check

      - name: Commit and push final source change
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/pmd_waiter_floor_compact_final.py
          rm -f .github/workflows/pmd-waiter-floor-compact-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/views/_layouts/default.blade.php .github
          git commit -m "Fix waiter floor compact expand behavior"
          git push origin HEAD:agent/waiter-floor-compact-expand-final
