name: PMD Waiter Floor V160.10 Validated

on:
  push:
    branches:
      - agent/waiter-floor-edit-layout-smooth-final

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-edit-layout-smooth-final
          fetch-depth: 0

      - name: Patch and validate
        id: patch
        shell: bash
        run: |
          set +e
          python3 .github/pmd_v160_10_patch.py > .github/pmd_v160_10_result.txt 2>&1
          RC=$?

          if [[ $RC -eq 0 ]]; then
            node --check app/admin/assets/js/pmd-waiter-floor-edit-v160.js >> .github/pmd_v160_10_result.txt 2>&1
            RC=$?
          fi

          if [[ $RC -eq 0 ]]; then
            {
              grep -F "pmd-waiter-floor-edit-v160.10" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
              grep -F "floorDomMode: 'stable-section-reconcile'" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
              grep -F "stableReconcile('dashboard-rendered')" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
              grep -F "multipleVisibleBadgeTables" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
              grep -F "V160.10 stable floor DOM + single badge authority active" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
            } >> .github/pmd_v160_10_result.txt 2>&1
            RC=$?
          fi

          echo "RESULT_CODE=$RC" >> .github/pmd_v160_10_result.txt
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app/admin/assets/js/pmd-waiter-floor-edit-v160.js .github/pmd_v160_10_result.txt
          git rm -f .github/workflows/pmd-waiter-floor-v160-10-validated.yml
          git rm -f .github/pmd_v160_10_patch.py
          git rm -f .github/pmd_floor_v175_v183_extract.txt || true

          if [[ "${{ steps.patch.outputs.rc }}" == "0" ]]; then
            git commit -m "Stop waiter floor polling jumps with stable DOM reconciliation"
          else
            git restore --staged app/admin/assets/js/pmd-waiter-floor-edit-v160.js || true
            git checkout -- app/admin/assets/js/pmd-waiter-floor-edit-v160.js || true
            git commit -m "Record failed V160.10 patch validation"
          fi

          git push origin HEAD:agent/waiter-floor-edit-layout-smooth-final
