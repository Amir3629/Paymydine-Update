name: PMD waiter floor V160.9 badge origin

on:
  push:
    branches:
      - agent/waiter-floor-edit-layout-smooth-final
    paths:
      - .github/workflows/pmd-waiter-floor-v160-9.yml
      - .github/pmd_v160_9_patch.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-edit-layout-smooth-final
          fetch-depth: 0

      - name: Patch V160.9
        run: |
          python3 .github/pmd_v160_9_patch.py app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          node --check app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "pmd-waiter-floor-edit-v160.9" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "badgeOrigin: 'border-box-corrected'" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "badgeRect.left - tableRect.left - borderLeftWidth" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "badgeRect.top - tableRect.top - borderTopWidth" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          ! grep -Fq "setImportant(badge, 'left', (badgeRect.left - tableRect.left).toFixed(2)" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          ! grep -Fq "setImportant(badge, 'top', (badgeRect.top - tableRect.top).toFixed(2)" app/admin/assets/js/pmd-waiter-floor-edit-v160.js

      - name: Commit patch and remove temporary files
        run: |
          rm -f .github/workflows/pmd-waiter-floor-v160-9.yml .github/pmd_v160_9_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/assets/js/pmd-waiter-floor-edit-v160.js .github
          git commit -m "Fix waiter floor badge proxy origin V160.9 [skip ci]"
          git push origin HEAD:agent/waiter-floor-edit-layout-smooth-final
