name: PMD Waiter Floor V160.5 Proxy Exclusion

on:
  push:
    branches:
      - agent/waiter-floor-edit-layout-smooth-final
    paths:
      - .github/pmd_waiter_floor_v160_5_proxy_exclude.py
      - .github/workflows/pmd-waiter-floor-v160-5-proxy-exclude.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-edit-layout-smooth-final
          fetch-depth: 0

      - name: Apply proxy exclusion patch
        run: python3 .github/pmd_waiter_floor_v160_5_proxy_exclude.py

      - name: Validate JavaScript
        run: |
          node --check app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "pmd-waiter-floor-edit-v160.5" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          test "$(grep -o ":not(.pmd-v160-drag-proxy)" app/admin/assets/js/pmd-waiter-floor-edit-v160.js | wc -l)" -ge 2

      - name: Commit clean result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/pmd_waiter_floor_v160_5_proxy_exclude.py .github/workflows/pmd-waiter-floor-v160-5-proxy-exclude.yml
          git add app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          git commit -m "Exclude drag proxy from floor collision queries [skip ci]"
          git push origin HEAD:agent/waiter-floor-edit-layout-smooth-final
