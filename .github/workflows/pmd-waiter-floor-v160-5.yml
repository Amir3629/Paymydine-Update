name: PMD Waiter Floor V160.5

on:
  push:
    branches:
      - agent/waiter-floor-edit-layout-smooth-final
    paths:
      - .github/pmd_waiter_floor_v160_5.py
      - .github/workflows/pmd-waiter-floor-v160-5.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-edit-layout-smooth-final
          fetch-depth: 0

      - name: Apply V160.5 patch
        run: python3 .github/pmd_waiter_floor_v160_5.py

      - name: Validate JavaScript
        run: |
          node --check app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "pmd-waiter-floor-edit-v160.5" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "dragVisual: 'isolated-proxy'" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "function createDragProxy" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "writeCenter(drag.proxy, desired, mapRect)" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          ! grep -Fq "writeCenter(drag.table, desired, mapRect)" app/admin/assets/js/pmd-waiter-floor-edit-v160.js

      - name: Commit clean result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/pmd_waiter_floor_v160_5.py .github/workflows/pmd-waiter-floor-v160-5.yml
          git add app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          git commit -m "Fix waiter floor drag with isolated proxy [skip ci]"
          git push origin HEAD:agent/waiter-floor-edit-layout-smooth-final
