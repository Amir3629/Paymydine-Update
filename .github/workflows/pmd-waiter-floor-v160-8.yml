name: PMD waiter floor V160.8 clean proxy

on:
  push:
    branches:
      - agent/waiter-floor-edit-layout-smooth-final
    paths:
      - .github/workflows/pmd-waiter-floor-v160-8.yml
      - .github/pmd_v160_8_clean_proxy.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-edit-layout-smooth-final
          fetch-depth: 0

      - name: Patch V160.8 clean visual proxy
        run: |
          python3 .github/pmd_v160_8_clean_proxy.py
          node --check app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "pmd-waiter-floor-edit-v160.8" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "body-fixed-clean-shell" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "one-number-visible-corner-badges-only" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "var proxy = document.createElement('div')" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "pmd-v160-proxy-number" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "visibleCornerBadges" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          ! grep -Fq "var proxy = table.cloneNode(true)" app/admin/assets/js/pmd-waiter-floor-edit-v160.js

      - name: Commit patch and remove temporary files
        run: |
          rm -f .github/workflows/pmd-waiter-floor-v160-8.yml .github/pmd_v160_8_clean_proxy.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/assets/js/pmd-waiter-floor-edit-v160.js .github
          git commit -m "Fix waiter floor drag proxy contents V160.8 [skip ci]"
          git push origin HEAD:agent/waiter-floor-edit-layout-smooth-final
