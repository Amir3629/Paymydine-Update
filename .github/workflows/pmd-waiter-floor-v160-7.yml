name: PMD waiter floor V160.7 transform guard

on:
  push:
    branches:
      - agent/waiter-floor-edit-layout-smooth-final
    paths:
      - .github/workflows/pmd-waiter-floor-v160-7.yml
      - .github/pmd_v160_7_patch.py

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/waiter-floor-edit-layout-smooth-final
          fetch-depth: 0

      - name: Apply V160.7 patch
        run: |
          python3 .github/pmd_v160_7_patch.py app/admin/assets/js/pmd-waiter-floor-edit-v160.js

      - name: Validate JavaScript and exact behavior
        run: |
          node --check app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "pmd-waiter-floor-edit-v160.7" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "PMD_V160_REAL_TABLE_TRANSFORM_GUARD" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "body-fixed-safe-visual-proxy" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "setImportant(proxy, 'contain', 'none')" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "unsafeProxyClasses" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          grep -Fq "transformMismatchTables" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          ! grep -Fq "pmd-waiter-floor-edit-v160.6" app/admin/assets/js/pmd-waiter-floor-edit-v160.js
          ! grep -Fq "layout paint style" app/admin/assets/js/pmd-waiter-floor-edit-v160.js

      - name: Confirm only V160 JavaScript changed
        run: |
          git status --short
          test "$(git status --short | awk '{print $2}' | grep -v '^.github/' | sort -u)" = "app/admin/assets/js/pmd-waiter-floor-edit-v160.js"

      - name: Commit clean result
        run: |
          rm -f .github/pmd_v160_7_patch.py .github/workflows/pmd-waiter-floor-v160-7.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/assets/js/pmd-waiter-floor-edit-v160.js .github
          git commit -m "Fix waiter floor drop transform and badge attachment V160.7 [skip ci]"
          git push origin HEAD:agent/waiter-floor-edit-layout-smooth-final
