name: Waiter POS V2 lint

on:
  pull_request:
    paths:
      - 'app/admin/controllers/PmdWaiterPosV1.php'
      - 'app/admin/controllers/PmdWaiterDashboardV150.php'
      - 'app/admin/controllers/PmdWaiterDashboardV151.php'
      - 'app/admin/controllers/concerns/PmdWaiterPos*.php'
      - 'app/admin/assets/js/pmd-waiter-pos*.js'
      - 'app/admin/views/waiter_pos*.blade.php'
      - 'app/admin/assets/css/pmd-waiter-pos*.css'
      - 'app/admin/views/_meta/assets.json'
      - 'app/admin/database/migrations/2026_07_12_000100_extend_waiter_pos_payment_transactions.php'
      - 'routes/admin-quick-mode.php'
      - 'scripts/deploy-pmd-waiter-pos-v2-selective.sh'
      - 'scripts/deploy-pmd-waiter-pos-click-routing-hotfix-v22.sh'
      - 'scripts/deploy-pmd-waiter-pos-direct-guard-hotfix-v23.sh'
      - 'scripts/deploy-pmd-waiter-pos-shadow-overlay-v24.sh'
      - 'scripts/deploy-pmd-waiter-pos-opaque-shadow-v25.sh'
      - 'scripts/deploy-pmd-waiter-pos-polish-v26.sh'
      - 'scripts/deploy-pmd-waiter-pos-stability-v27.sh'
      - 'scripts/deploy-pmd-waiter-order-visibility-v150.sh'
      - 'scripts/deploy-pmd-waiter-card-table-number-v151.sh'
      - 'scripts/deploy-pmd-waiter-floor-route-restore-v152.sh'
      - 'scripts/diagnose-pmd-order-flow-readonly.sh'
      - '.github/workflows/waiter-pos-v2-lint.yml'
  workflow_dispatch:

jobs:
  php-syntax:
    name: PHP · ${{ matrix.file }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        file:
          - app/admin/controllers/PmdWaiterPosV1.php
          - app/admin/controllers/PmdWaiterDashboardV150.php
          - app/admin/controllers/PmdWaiterDashboardV151.php
          - app/admin/controllers/concerns/PmdWaiterPosRenderEndpoints.php
          - app/admin/controllers/concerns/PmdWaiterPosSaveEndpoint.php
          - app/admin/controllers/concerns/PmdWaiterPosPaymentBasicEndpoints.php
          - app/admin/controllers/concerns/PmdWaiterPosSettleEndpoint.php
          - app/admin/controllers/concerns/PmdWaiterPosTerminalEndpoint.php
          - app/admin/controllers/concerns/PmdWaiterPosBootstrapConcern.php
          - app/admin/controllers/concerns/PmdWaiterPosMenuCatalogV26Concern.php
          - app/admin/controllers/concerns/PmdWaiterPosNoteHistoryV26Concern.php
          - app/admin/controllers/concerns/PmdWaiterPosOrderPersistenceConcern.php
          - app/admin/controllers/concerns/PmdWaiterPosCanonicalTableReferenceV150Concern.php
          - app/admin/controllers/concerns/PmdWaiterPosOrderScopeConcern.php
          - app/admin/controllers/concerns/PmdWaiterPosPaymentSummaryConcern.php
          - app/admin/controllers/concerns/PmdWaiterPosPaymentAllocationConcern.php
          - app/admin/controllers/concerns/PmdWaiterPosPaymentTransactionConcern.php
          - app/admin/database/migrations/2026_07_12_000100_extend_waiter_pos_payment_transactions.php
          - routes/admin-quick-mode.php
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - run: php -l "${{ matrix.file }}"

  js-syntax:
    name: JS · ${{ matrix.file }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        file:
          - app/admin/assets/js/pmd-waiter-pos-v1.js
          - app/admin/assets/js/pmd-waiter-pos-payment-v2.js
          - app/admin/assets/js/pmd-waiter-pos-payment-policy-v2.js
          - app/admin/assets/js/pmd-waiter-pos-dashboard-bridge-v2.js
          - app/admin/assets/js/pmd-waiter-pos-dashboard-shadow-bridge-v24.js
          - app/admin/assets/js/pmd-waiter-pos-dashboard-direct-guard-v23.js
          - app/admin/assets/js/pmd-waiter-pos-product-details-v3.js
          - app/admin/assets/js/pmd-waiter-pos-polish-v26.js
          - app/admin/assets/js/pmd-waiter-pos-simple-v27.js
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - run: node --check "${{ matrix.file }}"

  guards:
    name: JSON, route and deployment guards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - shell: bash
        run: |
          set -euo pipefail
          python -m json.tool app/admin/views/_meta/assets.json >/dev/null
          bash -n scripts/deploy-pmd-waiter-pos-v2-selective.sh
          bash -n scripts/deploy-pmd-waiter-pos-click-routing-hotfix-v22.sh
          bash -n scripts/deploy-pmd-waiter-pos-direct-guard-hotfix-v23.sh
          bash -n scripts/deploy-pmd-waiter-pos-shadow-overlay-v24.sh
          bash -n scripts/deploy-pmd-waiter-pos-opaque-shadow-v25.sh
          bash -n scripts/deploy-pmd-waiter-pos-polish-v26.sh
          bash -n scripts/deploy-pmd-waiter-pos-stability-v27.sh
          bash -n scripts/deploy-pmd-waiter-order-visibility-v150.sh
          bash -n scripts/deploy-pmd-waiter-card-table-number-v151.sh
          bash -n scripts/deploy-pmd-waiter-floor-route-restore-v152.sh
          bash -n scripts/diagnose-pmd-order-flow-readonly.sh
          grep -q 'READ-ONLY ORDER FLOW INVESTIGATION' scripts/diagnose-pmd-order-flow-readonly.sh
          grep -q 'No INSERT, UPDATE, DELETE' scripts/diagnose-pmd-order-flow-readonly.sh
          grep -q 'information_schema.SCHEMATA' scripts/diagnose-pmd-order-flow-readonly.sh
          grep -q 'php artisan igniter:up' scripts/deploy-pmd-waiter-pos-v2-selective.sh
          ! grep -q 'php artisan migrate' scripts/deploy-pmd-waiter-pos-v2-selective.sh
          ! grep -q 'Waiter POS routes are not registered after cache clear' scripts/deploy-pmd-waiter-pos-v2-selective.sh
          grep -q 'route:list does not expose' scripts/deploy-pmd-waiter-pos-v2-selective.sh
          grep -q 'pmd-waiter-pos-dashboard-shadow-bridge-v24.js' app/admin/views/_meta/assets.json
          grep -q 'pmd-waiter-pos-dashboard-direct-guard-v23.js' app/admin/views/_meta/assets.json
          grep -q 'pmd-waiter-pos-shadow-host-v25.css' app/admin/views/_meta/assets.json
          grep -q 'pmd-waiter-pos-polish-v26.css' app/admin/views/_meta/assets.json
          grep -q 'pmd-waiter-pos-simple-v27.css' app/admin/views/_meta/assets.json
          grep -q 'pmd-waiter-pos-simple-v27.js' app/admin/views/_meta/assets.json
          ! grep -q 'pmd-waiter-pos-polish-v26.js' app/admin/views/_meta/assets.json
          ! grep -q 'pmd-waiter-pos-dashboard-bridge-v2.js' app/admin/views/_meta/assets.json
          grep -q '/admin/pmd-waiter-pos-v1/payment-settle/' routes/admin-quick-mode.php
          grep -q "PmdWaiterDashboardV150::class, 'data'" routes/admin-quick-mode.php
          grep -q "PmdWaiterDashboardV150::class, 'audit'" routes/admin-quick-mode.php
          grep -q "PmdWaiterDashboardV151::class, 'data'" routes/admin-quick-mode.php
          ! grep -q "PmdWaiterDashboardV151::class, 'floorTables'" routes/admin-quick-mode.php
          grep -q 'do not override /admin/pmd-waiter-dashboard-v9-floor-tables' routes/admin-quick-mode.php
          grep -q 'class PmdWaiterDashboardV150 extends PmdWaiterDashboardV149' app/admin/controllers/PmdWaiterDashboardV150.php
          grep -q 'class PmdWaiterDashboardV151 extends PmdWaiterDashboardV150' app/admin/controllers/PmdWaiterDashboardV151.php
          grep -q "'order_type'" app/admin/controllers/PmdWaiterDashboardV150.php
          grep -q 'tableReferenceMaps' app/admin/controllers/PmdWaiterDashboardV150.php
          grep -q 'resolveOrderTable' app/admin/controllers/PmdWaiterDashboardV150.php
          grep -q 'attachOrderItems' app/admin/controllers/PmdWaiterDashboardV150.php
          grep -q "'table_number'" app/admin/controllers/PmdWaiterDashboardV151.php
          grep -q "'active_orders' => \$orders" app/admin/controllers/PmdWaiterDashboardV151.php
          grep -q 'waiter-dashboard-v151-v9-compatible-table-numbers' app/admin/controllers/PmdWaiterDashboardV151.php
          grep -q 'PmdWaiterPosCanonicalTableReferenceV150Concern' app/admin/controllers/PmdWaiterPosV1.php
          grep -q 'fillNewOrder insteadof' app/admin/controllers/PmdWaiterPosV1.php
          grep -q "'order_type' => (string)(int)\$table\['id'\]" app/admin/controllers/concerns/PmdWaiterPosCanonicalTableReferenceV150Concern.php
          grep -q 'Waiter order visibility V150 installed' scripts/deploy-pmd-waiter-order-visibility-v150.sh
          grep -q 'Waiter card table-number V151 installed' scripts/deploy-pmd-waiter-card-table-number-v151.sh
          grep -q 'Waiter floor endpoint V152 restored' scripts/deploy-pmd-waiter-floor-route-restore-v152.sh
          grep -q 'idempotency_key' app/admin/controllers/concerns/PmdWaiterPosSettleEndpoint.php
          grep -q 'PmdWaiterPosMenuCatalogV26Concern' app/admin/controllers/PmdWaiterPosV1.php
          grep -q 'menuPayload insteadof' app/admin/controllers/PmdWaiterPosV1.php
          grep -q 'recordWaiterPosNoteHistoryV26' app/admin/controllers/concerns/PmdWaiterPosSaveEndpoint.php
          grep -q "'orderable' => \$priceConfigured" app/admin/controllers/concerns/PmdWaiterPosMenuCatalogV26Concern.php
          grep -q "'/api/media/'" app/admin/controllers/concerns/PmdWaiterPosMenuCatalogV26Concern.php
          grep -q 'pmd-waiter-pos-product-details-v3.js' app/admin/views/waiter_pos.blade.php
          grep -q 'pmd-waiter-pos-simple-v27.js' app/admin/views/waiter_pos.blade.php
          grep -q 'PMDWaiterPOSSimpleV27.install' app/admin/views/waiter_pos.blade.php
          grep -q 'PMDWaiterPOSProductDetailsV3' app/admin/assets/js/pmd-waiter-pos-dashboard-shadow-bridge-v24.js
          grep -q 'attachShadow' app/admin/assets/js/pmd-waiter-pos-dashboard-shadow-bridge-v24.js
          grep -q 'document.documentElement.appendChild' app/admin/assets/js/pmd-waiter-pos-dashboard-shadow-bridge-v24.js
          grep -q 'dashboard-shadow-bridge-v2.4' app/admin/assets/js/pmd-waiter-pos-dashboard-shadow-bridge-v24.js
          grep -q 'PMDWaiterPOSDashboardDirectGuardV23' app/admin/assets/js/pmd-waiter-pos-dashboard-direct-guard-v23.js
          grep -q 'data-pmd-pos-direct-guard' app/admin/assets/js/pmd-waiter-pos-dashboard-direct-guard-v23.js
          grep -q 'data-pmd-pos-viewport-host="overlay"' app/admin/assets/css/pmd-waiter-pos-shadow-host-v25.css
          grep -q -- '--pmd-pos-bg: #f1f4f2' app/admin/assets/css/pmd-waiter-pos-shadow-host-v25.css
          grep -q 'background-color: #f1f4f2 !important' app/admin/assets/css/pmd-waiter-pos-shadow-host-v25.css
          grep -q 'pmd-pos-owner-gradient' app/admin/assets/css/pmd-waiter-pos-polish-v26.css
          grep -q 'is-price-required' app/admin/assets/css/pmd-waiter-pos-polish-v26.css
          grep -q 'PMD_WAITER_POS_POLISH_V26 = true' app/admin/assets/js/pmd-waiter-pos-simple-v27.js
          grep -q "observe(menu, {childList: true})" app/admin/assets/js/pmd-waiter-pos-simple-v27.js
          grep -q 'linear-gradient(90deg' app/admin/assets/css/pmd-waiter-pos-simple-v27.css
          grep -q 'pmd-pos-action.hold' app/admin/assets/css/pmd-waiter-pos-simple-v27.css
          grep -q 'calories' app/admin/controllers/concerns/PmdWaiterPosBootstrapConcern.php
          grep -q 'allergens' app/admin/controllers/concerns/PmdWaiterPosBootstrapConcern.php
          grep -q 'menu_images' app/admin/controllers/concerns/PmdWaiterPosBootstrapConcern.php
          grep -q 'pmd-pos-plus' app/admin/assets/css/pmd-waiter-pos-product-details-v3.css
          ! grep -q 'pmd-waiter-pos-dashboard-bridge-v1.js' app/admin/views/_meta/assets.json
